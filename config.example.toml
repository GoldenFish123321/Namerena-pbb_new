# ======== PBB 名字评分测号器 — TOML 配置示例 ========
# 用法: python3 main.py -c test-config.toml
# 或:   python3 main.py -c test-config.toml --threads 8
#
# 格式说明: TOML 使用 # 注释, 是目前最简洁的配置格式。
#           需要 Python 3.11+ (内置 tomllib) 或 pip install tomli。
# =======================================================

# debug 诊断输出: 0=关闭 1=开启 (引擎逐步输出 checkpoint 到 stderr)
debug_mode = 0

# 队伍名, 任意 UTF-8 字符串 (输入 '@' 使用自定义编码)
team_name = "test"

# ──────── 前缀/后缀 ────────
# 每个前缀独立枚举, 可添加多个并发
# name: 前缀内容, '+' = 无前缀
[[prefixes]]
name = "test-"

# 每个后缀与每个前缀配对
# name: 后缀内容, '+' = 无后缀
[[suffixes]]
name = "+"

# ──────── 字符集配置 ────────
[character_set]
# 单字符字节数: 1=单字节 2=双字节 3=三字节 4=四字节
single_char_length = 4

# 字符集类型列表, 按字节数选择:
#   1字节: 1=数字 2=小写字母 3=大写字母 4=自定义编码 5=ASCII
#   2字节: 1=小写希腊 2=大写希腊 3=小写俄文 4=大写俄文 5=小写拉丁 6=大写拉丁 7=自定义 8=Unicode区间
#   3字节: 1=全部汉字 2=常用汉字 3=平假名 4=片假名 5=盲文 6=扩展汉字 7=自定义 8=Unicode区间
#   4字节: 1=扩展汉字 2=自定义 3=Unicode区间
types = [2]

# 自定义字符 (字符串, 自动 UTF-8 编码; 兼容旧格式数字列表)
# 注意: scl=3 时用中文 ("你好世界"), scl=4 时用 emoji ("🐒🐵")
custom_values = "🐒🐵🐊🦎🐍🐛🙈🙉🙊🐉"

# Unicode 区间 (type=Unicode时使用)
unicode_ranges = []

# [已废弃] 引擎忽略
output_charset = 1

# ──────── 枚举配置 ────────
[enumeration]
# 枚举模式: 1=顺序 2=随机(区间) 3=随机(逐位) 4=随机(区间+配对)
# mode 2/3/4: range 控总次数(chunks×1M), 随机范围=charset_len^vlen(自动)
mode = 1

# 可变字符数: 名字中间枚举部分的字符个数
variable_length = 8

# mode 1: 枚举区间; mode 2/3/4: chunk 数 = (end-start)/1M
[[enumeration.ranges]]
start = 0         # 起始编号 (含)
end = 100000000   # 结束编号 (不含), 100M = 约 1~2 分钟

# ──────── 收集阈值 ────────
[collection]
# 虚评最低阈值, 推荐 4900~5000
xp_min = 4900

# 虚单最低阈值, 推荐 5600~6000 (与虚评为或关系)
xd_min = 5600

# 特殊属性号收集: 0=否 1=破纪录号(out/blue.txt)
collect_mode = 1

# collect_mode=2 时生效
[collection.special_thresholds]
eight_v_min = 777
seven_v_min = 700
hl_min = 93
hp398_eight_v_min = 741

# ──────── 输出配置 ────────
[output]
# 输出文件是否包含虚评虚单分数: 0=否 1=是
output_xp = 1

# 任务日志输出: 0=文件(out/task_log.txt) 1=屏幕
log_output = 1

# 速度信息输出: 0=文件(out/speed_log.txt) 1=屏幕
speed_output = 1

# 输出文件名: "+" =随机名, "-" =时间戳, 其他 =自定义 (自动加 out/ 前缀)
result_file = "-"

# ──────── 线程配置 ────────
[threads]
# 工作线程数: -1 =自动检测CPU核心数, 或指定 1/2/4/8 等
worker_threads = -1
